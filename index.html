<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Dependentes</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    padding: 30px;
}

.container {
    background: #fff;
    padding: 25px;
    border-radius: 10px;
    max-width: 800px;
    margin: auto;
}

.logo {
    display: block;
    margin: 0 auto 20px auto;
    max-width: 250px;
}

h2 {
    text-align: center;
}

.form-row {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
}

.form-group {
    flex: 1;
    display: flex;
    flex-direction: column;
}

input, select {
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    padding: 10px;
    margin-top: 10px;
    width: 100%;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

.add-btn {
    background: #28a745;
    color: white;
}

.submit-btn {
    background: #007bff;
    color: white;
}

.submit-btn:disabled {
    background: #999;
    cursor: not-allowed;
}

.status {
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h2>Cadastro de Dependentes</h2>

<form id="form">

    <div class="form-row">
        <div class="form-group">
            <label>Nome do Colaborador</label>
            <input type="text" name="colaborador" required>
        </div>

        <div class="form-group">
            <label>Setor</label>
            <select name="setor" required>
                <option>Atendimento (Cz)</option>
                <option>Atendimento (Jn)</option>
                <option>Atendimento (Ita)</option>
                <option>Atendimento (Art)</option>
                <option>Atendimento (Goi)</option>
                <option>Atendimento (CPi)</option>

                <option>Comercial (Cz)</option>
                <option>Comercial (Jn)</option>
                <option>Comercial (Ita)</option>
                <option>Comercial (Art)</option>
                <option>Comercial (Goi)</option>
                <option>Comercial (CPi)</option>

                <option>Contratos (Cz)</option>
                <option>Contratos (Jn)</option>
                <option>Contratos (Ita)</option>
                <option>Contratos (Art)</option>
                <option>Contratos (Goi)</option>
                <option>Contratos (CPi)</option>

                <option>Estoque (Cz)</option>
                <option>Estoque (Jn)</option>
                <option>Estoque (Ita)</option>
                <option>Estoque (Art)</option>
                <option>Estoque (Goi)</option>
                <option>Estoque (CPi)</option>

                <option>Faturamento (Cz)</option>
                <option>Faturamento (Jn)</option>
                <option>Faturamento (Ita)</option>
                <option>Faturamento (Art)</option>
                <option>Faturamento (Goi)</option>
                <option>Faturamento (CPi)</option>

                <option>Financeiro (Cz)</option>
                <option>Financeiro (Jn)</option>
                <option>Financeiro (Ita)</option>
                <option>Financeiro (Art)</option>
                <option>Financeiro (Goi)</option>
                <option>Financeiro (CPi)</option>

                <option>Laboratório de Apoio (Cz)</option>
                <option>Laboratório de Apoio (Jn)</option>
                <option>Laboratório de Apoio (Ita)</option>
                <option>Laboratório de Apoio (Art)</option>
                <option>Laboratório de Apoio (Goi)</option>
                <option>Laboratório de Apoio (CPi)</option>

                <option>NAC (Cz)</option>
                <option>NAC (Jn)</option>
                <option>NAC (Ita)</option>
                <option>NAC (Art)</option>
                <option>NAC (Goi)</option>
                <option>NAC (CPi)</option>

                <option>NTO (Cz)</option>
                <option>NTO (Jn)</option>
                <option>NTO (Ita)</option>
                <option>NTO (Art)</option>
                <option>NTO (Goi)</option>
                <option>NTO (CPi)</option>

                <option>Patrimônio/Manutenção (Cz)</option>
                <option>Patrimônio/Manutenção (Jn)</option>
                <option>Patrimônio/Manutenção (Ita)</option>
                <option>Patrimônio/Manutenção (Art)</option>
                <option>Patrimônio/Manutenção (Goi)</option>
                <option>Patrimônio/Manutenção (CPi)</option>

                <option>Qualidade (Cz)</option>
                <option>Qualidade (Jn)</option>
                <option>Qualidade (Ita)</option>
                <option>Qualidade (Art)</option>
                <option>Qualidade (Goi)</option>
                <option>Qualidade (CPi)</option>

                <option>Suprimentos (Cz)</option>
                <option>Suprimentos (Jn)</option>
                <option>Suprimentos (Ita)</option>
                <option>Suprimentos (Art)</option>
                <option>Suprimentos (Goi)</option>
                <option>Suprimentos (CPi)</option>

                <option>Tecnologia da Informação (Cz)</option>
                <option>Tecnologia da Informação (Jn)</option>
                <option>Tecnologia da Informação (Ita)</option>
                <option>Tecnologia da Informação (Art)</option>
                <option>Tecnologia da Informação (Goi)</option>
                <option>Tecnologia da Informação (CPi)</option>
            </select>
        </div>
    </div>

    <div id="dependentes"></div>

    <button type="button" class="add-btn" onclick="addDependente()">+ Adicionar Dependente</button>
    <button type="submit" class="submit-btn" id="btnEnviar">Enviar</button>

    <div class="status" id="status"></div>

</form>
</div>

<script>
let contador = 0;

function addDependente() {
    contador++;

    let div = document.createElement("div");

    div.innerHTML = `
        <hr>
        <h4>Dependente ${contador}</h4>

        <div class="form-row">
            <div class="form-group">
                <label>Nome</label>
                <input type="text" name="nome_${contador}" required>
            </div>

            <div class="form-group">
                <label>Data de nascimento</label>
                <input type="date" name="data_${contador}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>CPF</label>
                <input type="text" name="cpf_${contador}" maxlength="14" oninput="mascaraCPF(this)" required>
            </div>

            <div class="form-group">
                <label>Parentesco</label>
                <select name="parentesco_${contador}">
                    <option>Filho(a)</option>
                    <option>Cônjuge</option>
                    <option>Avô</option>
                    <option>Avó</option>
                    <option>Outro</option>
                </select>
            </div>
        </div>
    `;

    document.getElementById("dependentes").appendChild(div);
}

addDependente();

function mascaraCPF(campo) {
    let v = campo.value.replace(/\D/g, '');
    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
    campo.value = v;
}

function validarCPF(cpf) {
    cpf = cpf.replace(/\D/g, '');
    if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) return false;

    let soma = 0, resto;
    for (let i = 1; i <= 9; i++)
        soma += cpf[i - 1] * (11 - i);

    resto = (soma * 10) % 11;
    if (resto > 9) resto = 0;
    if (resto != cpf[9]) return false;

    soma = 0;
    for (let i = 1; i <= 10; i++)
        soma += cpf[i - 1] * (12 - i);

    resto = (soma * 10) % 11;
    if (resto > 9) resto = 0;
    if (resto != cpf[10]) return false;

    return true;
}

document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    let btn = document.getElementById("btnEnviar");
    let status = document.getElementById("status");

    let cpfs = document.querySelectorAll("input[name^='cpf_']");

    for (let input of cpfs) {
        if (!validarCPF(input.value)) {
            alert("CPF inválido: " + input.value);
            input.focus();
            return;
        }
    }

    btn.disabled = true;
    status.innerText = "Enviando...";

    fetch("https://script.google.com/macros/s/AKfycbxQM1RDwOMmDDoHZnatODOsRQV9N8NsvkG4fYlxOXYYwibGQySrFKoENZulZ1rxRQg/exec", {
        method: "POST",
        body: new FormData(this)
    })
    .then(() => {
        status.innerText = "✅ Enviado com sucesso!";
        setTimeout(() => location.reload(), 1500);
    })
    .catch(() => {
        status.innerText = "❌ Erro ao enviar";
        btn.disabled = false;
    });
});
</script>

</body>
</html>
