<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Dependentes</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    padding: 30px;
}

.container {
    background: #fff;
    padding: 25px;
    border-radius: 10px;
    max-width: 800px;
    margin: auto;
}

.logo {
    display: block;
    margin: 0 auto 20px auto;
    max-width: 250px;
}

h2 {
    text-align: center;
}

.form-row {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
}

.form-group {
    flex: 1;
    display: flex;
    flex-direction: column;
}

input, select {
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 5px;
    text-transform: uppercase;
}

button {
    padding: 10px;
    margin-top: 10px;
    width: 100%;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

.add-btn {
    background: #28a745;
    color: white;
}

.submit-btn {
    background: #007bff;
    color: white;
}

.submit-btn:disabled {
    background: #999;
}

.status {
    text-align: center;
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<img src="./logo.png" class="logo">

<h2>Cadastro de Dependentes</h2>

<form id="form">

<div class="form-row">
    <div class="form-group">
        <label>Nome do Colaborador</label>
        <input type="text" name="colaborador" oninput="maiusculo(this)" required>
    </div>

    <div class="form-group">
        <label>Setor</label>
        <select name="setor" required>
            <option value="">Selecione...</option>
            <option>ATENDIMENTO (CZ)</option>
            <option>ATENDIMENTO (JN)</option>
            <option>ATENDIMENTO (ITA)</option>
            <option>ATENDIMENTO (ART)</option>
            <option>ATENDIMENTO (GOI)</option>
            <option>ATENDIMENTO (CPI)</option>
            <option>COMERCIAL (CZ)</option>
            <option>COMERCIAL (JN)</option>
            <option>COMERCIAL (ITA)</option>
            <option>COMERCIAL (ART)</option>
            <option>COMERCIAL (GOI)</option>
            <option>COMERCIAL (CPI)</option>
        </select>
    </div>
</div>

<div id="dependentes"></div>

<button type="button" class="add-btn" onclick="addDependente()">+ Adicionar Dependente</button>
<button type="submit" class="submit-btn" id="btnEnviar">Enviar</button>

<div class="status" id="status"></div>

</form>
</div>

<script>

let contador = 0;

function maiusculo(campo) {
    campo.value = campo.value.toUpperCase();
}

function addDependente() {
    contador++;

    let div = document.createElement("div");

    div.innerHTML = `
        <hr>
        <h4>Dependente ${contador}</h4>

        <div class="form-row">
            <div class="form-group">
                <label>Nome</label>
                <input type="text" name="nome_${contador}" oninput="maiusculo(this)" required>
            </div>

            <div class="form-group">
                <label>Data de nascimento</label>
                <input type="date" name="data_${contador}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>CPF</label>
                <input type="text" name="cpf_${contador}" maxlength="14" oninput="mascaraCPF(this)" required>
            </div>

            <div class="form-group">
                <label>Parentesco</label>
                <select name="parentesco_${contador}">
                    <option>FILHO(A)</option>
                    <option>CÔNJUGE</option>
                    <option>AVÔ</option>
                    <option>AVÓ</option>
                    <option>OUTRO</option>
                </select>
            </div>
        </div>
    `;

    document.getElementById("dependentes").appendChild(div);
}

addDependente();

function mascaraCPF(campo) {
    let v = campo.value.replace(/\D/g, '');
    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
    campo.value = v;
}

function validarCPF(cpf) {
    cpf = cpf.replace(/\D/g, '');
    if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) return false;

    let soma = 0, resto;
    for (let i = 1; i <= 9; i++)
        soma += cpf[i - 1] * (11 - i);

    resto = (soma * 10) % 11;
    if (resto > 9) resto = 0;
    if (resto != cpf[9]) return false;

    soma = 0;
    for (let i = 1; i <= 10; i++)
        soma += cpf[i - 1] * (12 - i);

    resto = (soma * 10) % 11;
    if (resto > 9) resto = 0;
    if (resto != cpf[10]) return false;

    return true;
}

document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    let btn = document.getElementById("btnEnviar");
    let status = document.getElementById("status");

    let cpfs = document.querySelectorAll("input[name^='cpf_']");

    for (let input of cpfs) {
        if (!validarCPF(input.value)) {
            alert("CPF inválido: " + input.value);
            return;
        }
    }

    btn.disabled = true;
    status.innerText = "ENVIANDO...";

    let formData = new FormData(this);

    // 🔥 NÃO ALTERA CPF E DATA
    for (let [key, value] of formData.entries()) {
        if (key.startsWith("cpf") || key.startsWith("data")) continue;

        if (typeof value === "string") {
            formData.set(key, value.toUpperCase());
        }
    }

    fetch("https://script.google.com/macros/s/AKfycbxQM1RDwOMmDDoHZnatODOsRQV9N8NsvkG4fYlxOXYYwibGQySrFKoENZulZ1rxRQg/exec", {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(result => {

        if (result.startsWith("CPF_DUPLICADO")) {
            let nome = result.split("|")[1];
            status.innerText = "❌ CPF JÁ VINCULADO A " + nome;
            btn.disabled = false;
            return;
        }

        status.innerText = "✅ ENVIADO COM SUCESSO!";
        setTimeout(() => location.reload(), 1500);
    });
});
</script>

</body>
</html>
