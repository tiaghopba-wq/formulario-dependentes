<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Dependentes</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    padding: 30px;
}

.container {
    background: #fff;
    padding: 25px;
    border-radius: 10px;
    max-width: 800px;
    margin: auto;
}

h2 {
    text-align: center;
}

.form-row {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
}

.form-group {
    flex: 1;
    display: flex;
    flex-direction: column;
}

input, select {
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    padding: 10px;
    margin-top: 10px;
    width: 100%;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

.add-btn {
    background: #28a745;
    color: white;
}

.submit-btn {
    background: #007bff;
    color: white;
}
</style>
</head>

<body>

<div class="container">
<h2>Cadastro de Dependentes</h2>

<form id="form">

    <div class="form-group">
        <label>Nome do Colaborador</label>
        <input type="text" name="colaborador" required>
    </div>

    <div id="dependentes"></div>

    <button type="button" class="add-btn" onclick="addDependente()">+ Adicionar Dependente</button>
    <button type="submit" class="submit-btn">Enviar</button>

</form>
</div>

<script>

let contador = 0;

function addDependente() {
    contador++;

    let div = document.createElement("div");

    div.innerHTML = `
        <hr>
        <h4>Dependente ${contador}</h4>

        <div class="form-row">
            <div class="form-group">
                <label>Nome</label>
                <input type="text" name="nome_${contador}" required>
            </div>

            <div class="form-group">
                <label>Data de nascimento</label>
                <input type="date" name="data_${contador}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>CPF</label>
                <input type="text" name="cpf_${contador}" maxlength="14" oninput="mascaraCPF(this)" required>
            </div>

            <div class="form-group">
                <label>Parentesco</label>
                <select name="parentesco_${contador}">
                    <option>Filho(a)</option>
                    <option>Cônjuge</option>
                    <option>Pai</option>
                    <option>Mãe</option>
                    <option>Avô ou Avó</option>
                    <option>Outro</option>
                </select>
            </div>
        </div>
    `;

    document.getElementById("dependentes").appendChild(div);
}

// adiciona 1 dependente inicial
addDependente();


// 🔥 MÁSCARA CPF
function mascaraCPF(campo) {
    let v = campo.value.replace(/\D/g, '');

    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

    campo.value = v;
}


// 🔥 VALIDAÇÃO REAL CPF
function validarCPF(cpf) {
    cpf = cpf.replace(/\D/g, '');

    if (cpf.length !== 11) return false;
    if (/^(\d)\1{10}$/.test(cpf)) return false;

    let soma = 0;
    let resto;

    for (let i = 1; i <= 9; i++)
        soma += parseInt(cpf.substring(i - 1, i)) * (11 - i);

    resto = (soma * 10) % 11;
    if (resto === 10 || resto === 11) resto = 0;
    if (resto !== parseInt(cpf.substring(9, 10))) return false;

    soma = 0;

    for (let i = 1; i <= 10; i++)
        soma += parseInt(cpf.substring(i - 1, i)) * (12 - i);

    resto = (soma * 10) % 11;
    if (resto === 10 || resto === 11) resto = 0;
    if (resto !== parseInt(cpf.substring(10, 11))) return false;

    return true;
}


// 🚀 SUBMIT COM VALIDAÇÃO
document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    let cpfs = document.querySelectorAll("input[name^='cpf_']");

    for (let input of cpfs) {
        if (!validarCPF(input.value)) {
            alert("CPF inválido: " + input.value);
            input.focus();
            return;
        }
    }

    fetch("https://script.google.com/macros/s/AKfycbxQM1RDwOMmDDoHZnatODOsRQV9N8NsvkG4fYlxOXYYwibGQySrFKoENZulZ1rxRQg/exec", {
        method: "POST",
        body: new FormData(this)
    })
    .then(() => {
        alert("Dados enviados com sucesso!");
        location.reload();
    })
    .catch(() => alert("Erro ao enviar"));
});

</script>

</body>
</html>
