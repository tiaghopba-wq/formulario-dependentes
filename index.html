<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Dependentes</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    padding: 30px;
}

.container {
    background: #fff;
    padding: 25px;
    border-radius: 10px;
    max-width: 800px;
    margin: auto;
}

h2 {
    text-align: center;
}

.form-row {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
}

.form-group {
    flex: 1;
    display: flex;
    flex-direction: column;
}

input, select {
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

button {
    padding: 10px;
    margin-top: 10px;
    width: 100%;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

.add-btn {
    background: #28a745;
    color: white;
}

.submit-btn {
    background: #007bff;
    color: white;
}

</style>
</head>

<body>

<div class="container">
<h2>Cadastro de Dependentes</h2>

<form id="form">

    <!-- COLABORADOR -->
    <div class="form-group">
        <label>Nome do Colaborador</label>
        <input type="text" name="colaborador" required>
    </div>

    <div id="dependentes"></div>

    <button type="button" class="add-btn" onclick="addDependente()">+ Adicionar Dependente</button>
    <button type="submit" class="submit-btn">Enviar</button>

</form>

</div>

<script>
let contador = 0;

function addDependente() {
    contador++;

    let div = document.createElement("div");

    div.innerHTML = `
        <hr>
        <h4>Dependente ${contador}</h4>

        <div class="form-row">
            <div class="form-group">
                <label>Nome</label>
                <input type="text" name="nome_${contador}" required>
            </div>

            <div class="form-group">
                <label>Data de nascimento</label>
                <input type="date" name="data_${contador}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>CPF</label>
                <input type="text" name="cpf_${contador}" required>
            </div>

            <div class="form-group">
                <label>Parentesco</label>
                <select name="parentesco_${contador}">
                    <option>Filho(a)</option>
                    <option>Cônjuge</option>
                    <option>Outro</option>
                </select>
            </div>
        </div>
    `;

    document.getElementById("dependentes").appendChild(div);
}

// Adiciona 1 dependente inicial
addDependente();

document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    fetch("https://script.google.com/macros/s/AKfycbxQM1RDwOMmDDoHZnatODOsRQV9N8NsvkG4fYlxOXYYwibGQySrFKoENZulZ1rxRQg/exec", {
        method: "POST",
        body: new FormData(this)
    })
    .then(() => {
        alert("Dados enviados com sucesso!");
        location.reload();
    })
    .catch(() => alert("Erro ao enviar"));
});
</script>

</body>
</html>
